<!DOCTYPE html>
<html>
    <head>
        <title>
            Mingle | Sign In
        </title>
        <link rel="stylesheet" href="stylesignup.css"> 
    </head>

    <body style="font-family: tahoma; background-color: #d9ebf9;">
        <div id="MainBar">
            <span id="WebName">Mingle</span><br>
            <span id="slogan">Talk less, connect more</span><br>
            <span id="WebName">Join the Buzz!</span><br>
        </div>

        <div id="SignUpBar">
            <span style="font-weight: bold; color:#fed4c6"> Sign Up to Mingle</span><br><br>

            <input type="text" id="textBox" placeholder="First name"><br><br>
            <input type="text" id="textBox" placeholder="Last name"><br><br>

            <select id="mySelect" onchange="updateSelectColor(this)">
                <option disabled selected >Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select><br><br>
            <script>
                function updateSelectColor(selectElem) {
                selectElem.style.color = 'black';
                }
            </script>

            <input type="text" id="textBox" placeholder="Email"><br><br>

            <input type="password" id="textBox" placeholder="Password"><br><br>
            <input type="password" id="textBox" placeholder="Retype Password"><br><br>

            <input type="submit" id="SignUpButton" value="Sign Up"><br><br>
            <a href="forgottenPass.html">
                <span style="font-size:13px;">Forgotten password ?</span><br><br>
            </a>
            <span style="font-size:13px;">Already have an account? </span>
            <a href="login.html">
                <span style="font-size:13px;"> Log In</span><br><br><br>
            </a>
        </div>
    </body>

</html>

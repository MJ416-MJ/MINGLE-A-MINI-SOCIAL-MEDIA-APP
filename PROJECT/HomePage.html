<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="homePage.css">
</head>
<body>
    <!-- Header with logo, slogan and heading -->
    <div class="header">
        <div class="logoSloganWrapper"><!--Wrapper for styling the logo and slogan together-->
            <img src="logo.png" alt="logo" class="logo"><!--Logo image-->
            <p id="slogan">Talk less, connect more.</p><!--slogan-->
        </div>
        <h2 class="heading">Home</h2><!--page heading-->
        <p class="joinBuzzText">Join the Buzz!</p>
    </div>

    <!-- Main Content Container -->
    <div class="container">
        <button class="menu-toggle" onclick="toggleNavbar()">☰ Menu</button><!--Menu button for smaller screens-->
        <div class="navbar" id="navbar"><!--Navigation bar with links to other pages-->
            <a href="HomePage.html" class="link">🏠Home</a>
            <a href="Notifications.html" class="link">🔔 Notifications</a>
            <a href="ProfilePage.html" class="link">👤My Profile</a>
            <div class="searchBar"><!--Search bar for finding friends, posts, etc-->
                 <span class="search-icon">🔍</span>
                <input type="text" placeholder="Find" id="searchInput">
            </div>
        </div>

        <!-- Main user feed where user is able to view everyone's posts -->
        <div class="userFeed">

            <!-- Section where user can make a new post from -->
            <div class="post-container">
                    <textarea id="postInput" placeholder="Share a thought..." style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; font-size: 18px;"></textarea>
                    <button id="postBtn" onclick="createPost()">Post</button><!--Button that allows user to make a post-->
            </div>
            
            <div id="postContainer"></div><!--Container that will hold any new post the user makes-->

            <div class="post-bar"><!--Container that will hold the posts made by other users-->

                <div class="post"><!-- Post 1 -->
                    <div><img src="pp.jpg" alt="profile pic" class="userProfPics"></div>

                    <div class="postText"><!--Contains the contents of the main post-->

                        <div class="userName-Timeline"><!--Div that wraps the username and timeline together-->
                            <div class="userName"><b>@ Dane Johnson</b></div><span style="font-size: 15px;">.  Timeline</span>
                        </div>
                        <p>Made a new friend today!</p><!--Main content of the post-->
                        <br>

                        <!--Buttons that allow user to like or comment on a post-->
                        <button class="likeBtn">Like</button> <button class="commentBtn">Comment</button>

                        <!-- Section that toggles when 'Comment' button is clicked -->
                        <div class="commentSection">
                            <input type="text" class="commentInput" placeholder="Write a comment..." /><!--Allows the user to write new comments on a post-->
                            <button class="submitCommentBtn">Submit</button><!--Allows user to submit a comment-->
                        </div>

                        <!--List of comments submitted or to be submitted-->
                        <div class="commentsList"></div>
                    </div>
                </div>

                <div class="post"><!-- Post 2 -->
                    <div><img src="pp.jpg" alt="profile pic" class="userProfPics"></div>

                    <div class="postText"><!--Contains the contents of the main post-->

                        <div class="userName-Timeline"><!--Div that wraps the username and timeline together-->
                            <div class="userName"><b>@ Sam Jagers</b></div><span style="font-size: 15px;">.  Timeline</span>
                        </div>
                        <p>Projects are exhausting 😴</p><!--Main content of the post-->
                        <br>

                        <!--Buttons that allow user to like or comment on a post-->
                        <button class="likeBtn">Like</button> <button class="commentBtn">Comment</button>
                        
                        <!-- Section that toggles when 'Comment' button is clicked -->
                        <div class="commentSection">
                            <input type="text" class="commentInput" placeholder="Write a comment..." /><!--Allows the user to write new comments on a post-->
                            <button class="submitCommentBtn">Submit</button><!--Allows user to submit a comment-->
                        </div>
                        
                        <!--List of comments submitted or to be submitted-->
                        <div class="commentsList"></div>
                    </div>
                </div>

            </div>

        </div>

        <div class="endOfPage"><!--End of page with log out link and copyright information-->
            <a href="" class="logOutLink">Log Out</a>
            <footer><p>&copy; 2025 Mingle.  All rights reserved.</p></footer>
        </div>
    </div>
    
<script src="homePage.js"></script>
</body>
</html>
